name: Harness Checks
on:
  push:
  pull_request:
  # 클론 후, 본인 테스트 파이프라인이 끝난 뒤 하네스 검사를 다시 돌리고 싶다면
  # 아래를 켜고 workflows 값을 실제 워크플로 이름으로 교체하세요(이 템플릿엔 없음).
  # workflow_run:
  #   workflows: ["<your pipeline name>"]
  #   types: [completed]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: ZFS naming linter (Fail-close gate)
        run: node scripts/zfs-linter.js
      - name: HISTORY reason gate (Fail-close; no-op if HISTORY absent)
        run: node scripts/history-linter.js
      - name: ZFS util tests
        run: node scripts/zfs_util.test.js
      - name: ZFS index integration tests
        run: node scripts/zfs_index.test.js
      - name: HISTORY linter tests
        run: node scripts/history-linter.test.js
