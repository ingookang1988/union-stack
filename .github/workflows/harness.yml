name: Harness Checks
on:
  push:
  pull_request:
  workflow_run:
    workflows: ["E2E Test Pipeline"]
    types: [completed]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: ZFS naming linter (Fail-close gate)
        run: node scripts/zfs-linter.js
      - name: ZFS util tests
        run: node scripts/zfs_util.test.js
