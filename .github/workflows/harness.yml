name: Harness Checks
on:
  push:
  pull_request:
  # 클론 후, 본인 테스트 파이프라인이 끝난 뒤 하네스 검사를 다시 돌리고 싶다면
  # 아래를 켜고 workflows 값을 실제 워크플로 이름으로 교체하세요(이 템플릿엔 없음).
  # workflow_run:
  #   workflows: ["<your pipeline name>"]
  #   types: [completed]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 } # permission-guard 의 diff 범위가 이전 커밋을 보려면 전체 히스토리 필요
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: ZFS naming linter (Fail-close gate)
        run: node scripts/zfs-linter.js
      - name: HISTORY reason gate (Fail-close; no-op if HISTORY absent)
        run: node scripts/history-linter.js
      - name: Permission guard (append-only integrity, Fail-close)
        # 새 브랜치 첫 push에선 github.event.before 가 zero-SHA라 diff가 실패하고
        # 가드가 "변경 없음"으로 조용히 통과한다 → 직전 커밋(없으면 빈 트리)으로 폴백.
        run: |
          BASE="${{ github.event.pull_request.base.sha || github.event.before }}"
          if [ -z "$BASE" ] || ! git cat-file -e "$BASE" 2>/dev/null; then
            BASE=$(git rev-parse "${{ github.sha }}~1" 2>/dev/null || git hash-object -t tree /dev/null)
          fi
          node scripts/permission-guard.js --range "$BASE..${{ github.sha }}"
      - name: Full test suite (all gate + query + hook + eval logic)
        run: npm test
      - name: Health scorecard (gate status + structural metrics)
        run: node scripts/health.js
